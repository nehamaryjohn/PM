services:
  - type: web
    name: skillscore
    runtime: python
    rootDirectory: SkillScore
    buildCommand: "bash ./render-build.sh"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skillscore-db
          property: connectionString

databases:
  - name: skillscore-db
    plan: free
