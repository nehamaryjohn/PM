<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillScore - Career Readiness</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-light: #f8fafc;
            --primary-color: #0284c7;
            --secondary-color: #0f172a;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND DESIGN --- */
        /* Animated blurred blobs for that modern SaaS look */
        .bg-visuals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(2, 132, 199, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* --- NAVBAR --- */
        .navbar-custom {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
            letter-spacing: -0.5px;
        }

        .btn-auth {
            font-weight: 600;
            border-radius: 8px;
            padding: 0.5rem 1.2rem;
            transition: 0.2s;
        }

        /* --- WRAPPERS --- */
        .main-wrapper {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    
    <div class="bg-visuals">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    {# Only show the top Navbar if the user is NOT logged in #}
    {% if not session['user_id'] %}
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-rocket-takeoff-fill me-2"></i> SkillScore
            </a>
            <div class="ms-auto d-flex gap-2">
                <a class="nav-link btn-auth text-dark" href="/login">Login</a>
                <a class="btn btn-primary btn-auth shadow-sm text-white" href="/register">Get Started</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="main-wrapper">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
