{% extends "layout.html" %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    /* Style overrides to match the layout's light/airy feel */
    .login-wrapper {
        min-height: calc(100vh - 80px); /* Adjust based on your navbar height */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px) saturate(180%);
        -webkit-backdrop-filter: blur(15px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 420px;
        padding: 40px;
    }

    .login-title {
        color: #0f172a;
        font-weight: 800;
        letter-spacing: -1px;
    }

    .input-box {
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(2, 132, 199, 0.1);
        border-radius: 15px;
        padding: 12px 18px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    .input-box:focus-within {
        background: #fff;
        border-color: #0284c7;
        box-shadow: 0 10px 20px rgba(2, 132, 199, 0.08);
        transform: translateY(-2px);
    }

    .input-box i {
        color: #64748b;
        margin-right: 12px;
        font-size: 1.1rem;
    }

    .input-box input {
        border: none;
        background: transparent;
        width: 100%;
        outline: none;
        font-weight: 500;
        color: #1e293b;
    }

    .btn-submit {
        background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 15px;
        width: 100%;
        font-weight: 700;
        box-shadow: 0 10px 20px rgba(2, 132, 199, 0.2);
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        transform: scale(1.02);
        box-shadow: 0 15px 25px rgba(2, 132, 199, 0.3);
        color: white;
    }

    .label-text {
        font-size: 0.75rem;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
        margin-left: 5px;
    }

    .footer-link {
        color: #0284c7;
        text-decoration: none;
        font-weight: 700;
    }
</style>

<div class="login-wrapper">
    <div class="glass-card">
        <div class="text-center mb-5">
            <div class="mb-3 d-inline-block p-3 rounded-circle" style="background: rgba(2, 132, 199, 0.1);">
                <i class="bi bi-shield-lock-fill" style="font-size: 2rem; color: #0284c7;"></i>
            </div>
            <h2 class="login-title">Welcome Back</h2>
            <p class="text-muted">Enter your details to access SkillScore</p>
        </div>

        <form action="/login" method="post">
            <span class="label-text">Username</span>
            <div class="input-box">
                <i class="bi bi-person-circle"></i>
                <input type="text" name="username" placeholder="Your username" required>
            </div>

            <div class="d-flex justify-content-between align-items-center">
                <span class="label-text">Password</span>
                <a href="#" class="text-muted small mb-2 text-decoration-none">Reset?</a>
            </div>
            <div class="input-box">
                <i class="bi bi-key-fill"></i>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-check mb-4 ms-1">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label small text-muted" for="remember">
                    Remember this device
                </label>
            </div>

            <button type="submit" class="btn btn-submit">
                Authorize Access <i class="bi bi-arrow-right-short ms-1"></i>
            </button>
        </form>

        <div class="text-center mt-5">
            <span class="text-muted small">New to the platform?</span><br>
            <a href="/register" class="footer-link">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
